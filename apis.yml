description: >-
  NeueHealth operates a healthcare platform that aligns interests across
  consumers, payors, and providers to enable value-driven, consumer-centric
  care. The company serves more than 600,000 health consumers and manages
  approximately $2.5 billion in medical expenses through partnerships with
  21 payors and over 3,000 affiliated providers. NeueHealth operates two
  segments: NeueCare for direct clinical delivery and NeueSolutions for
  supporting independent providers in performance-based care arrangements.
